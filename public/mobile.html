<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>캐릭터 만들기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif;
    background: #1a1a2e;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  h1 { font-size: 18px; margin-bottom: 12px; }

  .preview {
    background: #16213e;
    border-radius: 12px;
    width: 240px;
    height: 240px;
    position: relative;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .preview img {
    position: absolute;
    top: 0; left: 0;
    width: 240px;
    height: 240px;
  }
  canvas { display: none; }

  .category {
    width: 100%;
    max-width: 360px;
    margin-bottom: 12px;
  }
  .category h2 {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 6px;
  }
  .options {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .option {
    min-width: 64px;
    width: 64px;
    height: 64px;
    border: 3px solid #333;
    border-radius: 8px;
    background: #16213e;
    cursor: pointer;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .option.selected { border-color: #e94560; }
  .option img {
    width: 56px;
    height: 56px;
    object-fit: contain;
  }
  .option.none-option {
    font-size: 20px;
    color: #555;
  }

  .submit-btn {
    margin-top: 12px;
    width: 100%;
    max-width: 360px;
    padding: 14px;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  .submit-btn:disabled {
    background: #555;
    cursor: not-allowed;
  }
  .submit-btn:active:not(:disabled) { background: #c73650; }

  .status {
    margin-top: 8px;
    font-size: 13px;
    color: #aaa;
    height: 20px;
  }
</style>
</head>
<body>

<h1>캐릭터 만들기</h1>

<div class="preview" id="preview">
  <img id="layer-base" src="/cards/base/00.PNG">
  <img id="layer-clothes" src="/cards/clothes/0.PNG">
  <img id="layer-hand" src="/cards/hand/0.PNG">
  <img id="layer-head" src="/cards/head/0.PNG">
  <img id="layer-acc" src="/cards/acc/0.PNG">
</div>
<canvas id="canvas" width="2048" height="2048"></canvas>

<div class="category">
  <h2>Clothes</h2>
  <div class="options" id="clothes-options"></div>
</div>

<div class="category">
  <h2>Head</h2>
  <div class="options" id="head-options"></div>
</div>

<div class="category">
  <h2>Hand</h2>
  <div class="options" id="hand-options"></div>
</div>

<div class="category">
  <h2>Accessory</h2>
  <div class="options" id="acc-options"></div>
</div>

<button class="submit-btn" id="submitBtn">전송하기</button>
<div class="status" id="status"></div>

<script>
const categories = {
  clothes: { files: [0, 1, 2, 3], selected: 0 },
  head:    { files: [0, 6, 7, 8, 9, 10, 11, 12, 13, 14], selected: 0 },
  hand:    { files: [0, 4, 5], selected: 0 },
  acc:     { files: [0, 15, 16, 17], selected: 0 },
};

// 선택지 UI 생성
Object.keys(categories).forEach(cat => {
  const container = document.getElementById(`${cat}-options`);
  const { files } = categories[cat];
  files.forEach((fileNum, idx) => {
    const div = document.createElement('div');
    div.className = 'option' + (idx === 0 ? ' selected' : '');
    if (fileNum === 0) {
      div.classList.add('none-option');
      div.textContent = '✕';
    } else {
      div.innerHTML = `<img src="/cards/${cat}/${fileNum}.PNG">`;
    }
    div.addEventListener('click', () => selectOption(cat, fileNum, idx));
    container.appendChild(div);
  });
});

function selectOption(cat, fileNum, idx) {
  categories[cat].selected = fileNum;
  document.getElementById(`layer-${cat}`).src = `/cards/${cat}/${fileNum}.PNG`;
  const options = document.getElementById(`${cat}-options`).children;
  for (let i = 0; i < options.length; i++) {
    options[i].classList.toggle('selected', i === idx);
  }
}

// 전송
document.getElementById('submitBtn').addEventListener('click', async () => {
  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = '전송 중...';

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 2048, 2048);

  const layers = [
    '/cards/base/00.PNG',
    `/cards/clothes/${categories.clothes.selected}.PNG`,
    `/cards/hand/${categories.hand.selected}.PNG`,
    `/cards/head/${categories.head.selected}.PNG`,
    `/cards/acc/${categories.acc.selected}.PNG`,
  ];

  for (const src of layers) {
    await drawLayer(ctx, src);
  }

  const dataUrl = canvas.toDataURL('image/png');

  try {
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: dataUrl }),
    });
    const data = await res.json();
    if (data.ok) {
      status.textContent = '전송 완료!';
    } else {
      status.textContent = '전송 실패';
    }
  } catch (e) {
    status.textContent = '오류: ' + e.message;
  }

  setTimeout(() => { btn.disabled = false; }, 2000);
});

function drawLayer(ctx, src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => { ctx.drawImage(img, 0, 0, 2048, 2048); resolve(); };
    img.onerror = reject;
    img.src = src;
  });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>캐릭터 만들기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif;
    background: #1a1a2e;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  h1 { font-size: 18px; margin-bottom: 12px; }

  .preview {
    background: #16213e;
    border-radius: 12px;
    width: 200px;
    height: 300px;
    position: relative;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .preview img {
    position: absolute;
    top: 0; left: 0;
    width: 200px;
    height: 300px;
  }
  canvas { display: none; }

  .category {
    width: 100%;
    max-width: 320px;
    margin-bottom: 12px;
  }
  .category h2 {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 6px;
  }
  .options {
    display: flex;
    gap: 8px;
  }
  .option {
    width: 80px;
    height: 80px;
    border: 3px solid #333;
    border-radius: 8px;
    background: #16213e;
    cursor: pointer;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .option.selected { border-color: #e94560; }
  .option img {
    width: 70px;
    height: 70px;
    object-fit: contain;
  }

  .submit-btn {
    margin-top: 12px;
    width: 100%;
    max-width: 320px;
    padding: 14px;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  .submit-btn:disabled {
    background: #555;
    cursor: not-allowed;
  }
  .submit-btn:active:not(:disabled) { background: #c73650; }

  .status {
    margin-top: 8px;
    font-size: 13px;
    color: #aaa;
    height: 20px;
  }
</style>
</head>
<body>

<h1>캐릭터 만들기</h1>

<div class="preview" id="preview">
  <img id="layer-body" src="/assets/body_1.svg">
  <img id="layer-top" src="/assets/top_1.svg">
  <img id="layer-hair" src="/assets/hair_1.svg">
</div>
<canvas id="canvas" width="200" height="300"></canvas>

<div class="category">
  <h2>Body</h2>
  <div class="options" id="body-options"></div>
</div>

<div class="category">
  <h2>Hair</h2>
  <div class="options" id="hair-options"></div>
</div>

<div class="category">
  <h2>Top</h2>
  <div class="options" id="top-options"></div>
</div>

<button class="submit-btn" id="submitBtn">전송하기</button>
<div class="status" id="status"></div>

<script>
const state = { body: 1, hair: 1, top: 1 };
const categories = ['body', 'hair', 'top'];

// 선택지 UI 생성
categories.forEach(cat => {
  const container = document.getElementById(`${cat}-options`);
  for (let i = 1; i <= 3; i++) {
    const div = document.createElement('div');
    div.className = 'option' + (i === 1 ? ' selected' : '');
    div.innerHTML = `<img src="/assets/${cat}_${i}.svg">`;
    div.addEventListener('click', () => selectOption(cat, i));
    container.appendChild(div);
  }
});

function selectOption(cat, idx) {
  state[cat] = idx;
  // 미리보기 업데이트
  document.getElementById(`layer-${cat}`).src = `/assets/${cat}_${idx}.svg`;
  // 선택 표시 업데이트
  const options = document.getElementById(`${cat}-options`).children;
  for (let i = 0; i < options.length; i++) {
    options[i].classList.toggle('selected', i === idx - 1);
  }
}

// 전송
document.getElementById('submitBtn').addEventListener('click', async () => {
  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = '전송 중...';

  // 캔버스에 레이어 합성
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 200, 300);

  const layers = ['body', 'top', 'hair'];
  for (const cat of layers) {
    await drawLayer(ctx, `/assets/${cat}_${state[cat]}.svg`);
  }

  const dataUrl = canvas.toDataURL('image/png');

  try {
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: dataUrl }),
    });
    const data = await res.json();
    if (data.ok) {
      status.textContent = '전송 완료!';
    } else {
      status.textContent = '전송 실패';
    }
  } catch (e) {
    status.textContent = '오류: ' + e.message;
  }

  setTimeout(() => { btn.disabled = false; }, 2000);
});

function drawLayer(ctx, src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => { ctx.drawImage(img, 0, 0, 200, 300); resolve(); };
    img.onerror = reject;
    img.src = src;
  });
}
</script>
</body>
</html>
